<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>priemiro desafio do elias</title>
    <link rel="stylesheet" href="style.css">
</head>

<!--
            HIERARQUIA DAS TABELAS (simples)
            TABLE = TABELA
                TABLE ROW = LINHA DA TABELA
                    TABLE HEADER = CABEÇALHO DA TABELA
                    TABLE DATA = DADO DE TABELA
        -->

<body>
    <div id="dados">
        <h1><u>Re</u>gistro</h1>
        <h2 id="cinza">Detalhes Pessoais</h2>
        <table>
            <tr>
                <td>
                    <p><label for="iname">Full name</label></p>
                    <input type="text" name="name" id="iname" placeholder="digite seu nome de usuario">
                </td>
                <td>
                    <p><label for="iDate">Date of Birth</label></p>
                    <input type="date" name="Date" id="iDate" placeholder="">
                </td>
                <td>
                    <p><label for="iEmail">Email</label></p>
                    <input type="email" name="Email" id="iEmail" placeholder="">
                </td>
            <label for=""></tr></label>
            <tr>
                <td>
                    <p><label for="iPhone">Mobile Phone</label></p>
                    <input type="number" name="Phone" id="iPhone" placeholder="">
                </td>
                <td>
                    <p><label for="iGender">Gender</label></p>
                    <input type="text" name="Gender" id="iGender" placeholder="">
                </td>
                <td>
                    <p><label for="iOccupation">Occupation</label></p>
                    <input type="text" name="Occupation" id="iOccupation" placeholder="">
                </td>
            </tr>
        </table>

        <h2>Detalhe de Identidade</h2>
        <table>
            <tr>
                <td>
                    <p><label for="iIDType">ID Type</label></p>
                    <input type="text" name="IDType" id="iIDType" placeholder="">
                </td>
                <td>
                    <p><label for="iIDNumber">ID Number</label></p>
                    <input type="text" name="IDNumber" id="iIDNumber" placeholder="">
                </td>
                <td>
                    <p><label for="iIAuthority">Issue Authority</label></p>
                    <input type="text" name="IAuthority" id="iIAuthority" placeholder="">
                </td>
            </tr>
            <tr>
                <td>
                    <p><label for="iIDate">Issue Date</label></p>
                    <input type="text" name="IDate" id="iIDate" placeholder="">
                </td>
                <td>
                    <p><label for="iIState">Issue State</label></p>
                    <input type="text" name="IState" id="iIState" placeholder="">
                </td>
                <td>
                    <p><label for="iEDate">Expiry Date</label></p>
                    <input type="text" name="EDate" id="iEDate" placeholder="">
                </td>
            </tr>
        </table>
        <div id="link">
            <a href="">Next</a>
        </div>
    </div>
    
    
</body>
</html>
